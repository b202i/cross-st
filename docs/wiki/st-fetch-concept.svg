<svg width="960" height="290" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arr"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#546e7a"/></marker>
    <marker id="arrgrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2e7d32"/></marker>
    <marker id="arrblu" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1565c0"/></marker>
  </defs>

  <!-- background -->
  <rect width="960" height="290" fill="#f5f6f8" rx="10"/>

  <!-- title -->
  <text x="480" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">st-fetch — Import Any Source into the Cross Pipeline</text>
  <text x="480" y="37" text-anchor="middle" font-size="9" fill="#607d8b">Imports content as a data entry · st-prep chains automatically · container is then ready for any st-* command</text>

  <!-- ── COLUMN 1: Sources ──────────────────────────────────────────────── -->

  <!-- column label -->
  <text x="105" y="57" text-anchor="middle" font-size="9" font-weight="700" fill="#546e7a" letter-spacing="1">SOURCES</text>

  <!-- Tweet -->
  <rect x="20" y="64" width="170" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.3"/>
  <text x="35"  y="83" font-size="10" fill="#1565c0">🐦</text>
  <text x="52"  y="83" font-size="9.5" font-weight="600" fill="#0d47a1">Tweet ID</text>
  <text x="135" y="83" font-size="8.5" fill="#546e7a" font-family="'SF Mono',monospace">tweet_id</text>

  <!-- Text / Markdown file -->
  <rect x="20" y="100" width="170" height="28" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.3"/>
  <text x="35"  y="119" font-size="10" fill="#388e3c">📄</text>
  <text x="52"  y="119" font-size="9.5" font-weight="600" fill="#1b5e20">.txt / .md file</text>
  <text x="148" y="119" font-size="8.5" fill="#546e7a" font-family="'SF Mono',monospace">--file</text>

  <!-- PDF file -->
  <rect x="20" y="136" width="170" height="28" rx="5" fill="#fce4ec" stroke="#c62828" stroke-width="1.3"/>
  <text x="35"  y="155" font-size="10" fill="#c62828">📕</text>
  <text x="52"  y="155" font-size="9.5" font-weight="600" fill="#b71c1c">PDF file</text>
  <text x="148" y="155" font-size="8.5" fill="#546e7a" font-family="'SF Mono',monospace">--file</text>

  <!-- URL -->
  <rect x="20" y="172" width="170" height="28" rx="5" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.3"/>
  <text x="35"  y="191" font-size="10" fill="#7b1fa2">🌐</text>
  <text x="52"  y="191" font-size="9.5" font-weight="600" fill="#4a148c">Web URL</text>
  <text x="148" y="191" font-size="8.5" fill="#546e7a" font-family="'SF Mono',monospace">--url</text>

  <!-- Clipboard -->
  <rect x="20" y="208" width="170" height="28" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.3"/>
  <text x="35"  y="227" font-size="10" fill="#e65100">📋</text>
  <text x="52"  y="227" font-size="9.5" font-weight="600" fill="#bf360c">Clipboard</text>
  <text x="135" y="227" font-size="8.5" fill="#546e7a" font-family="'SF Mono',monospace">--clipboard</text>

  <!-- arrows: sources → st-fetch -->
  <line x1="190" y1="78"  x2="255" y2="145" stroke="#90a4ae" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="114" x2="255" y2="150" stroke="#90a4ae" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="150" x2="255" y2="155" stroke="#90a4ae" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="186" x2="255" y2="160" stroke="#90a4ae" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="222" x2="255" y2="165" stroke="#90a4ae" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── COLUMN 2: st-fetch ─────────────────────────────────────────────── -->
  <rect x="257" y="110" width="118" height="90" rx="8" fill="#eceff1" stroke="#546e7a" stroke-width="2"/>
  <text x="316" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#263238">st-fetch</text>
  <line x1="259" y1="150" x2="373" y2="150" stroke="#546e7a" stroke-width="0.8" opacity="0.4"/>
  <text x="316" y="163" text-anchor="middle" font-size="8.5" fill="#546e7a">detect · extract</text>
  <text x="316" y="175" text-anchor="middle" font-size="8.5" fill="#546e7a">title · text · markdown</text>
  <text x="316" y="188" text-anchor="middle" font-size="8"   fill="#90a4ae" font-style="italic">deduplicates on MD5</text>

  <!-- arrow: st-fetch → container -->
  <line x1="375" y1="155" x2="440" y2="155" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── COLUMN 3: Container ───────────────────────────────────────────── -->
  <rect x="442" y="110" width="140" height="90" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="2"/>
  <text x="512" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#e65100" font-family="'SF Mono',monospace">article.json</text>
  <line x1="444" y1="141" x2="580" y2="141" stroke="#f9a825" stroke-width="0.8" opacity="0.5"/>
  <text x="512" y="154" text-anchor="middle" font-size="8.5" fill="#bf360c">data[ ] entry added</text>
  <text x="512" y="167" text-anchor="middle" font-size="8.5" fill="#bf360c">make · model · title</text>
  <text x="512" y="180" text-anchor="middle" font-size="8.5" fill="#bf360c">text · markdown</text>
  <text x="512" y="193" text-anchor="middle" font-size="8"   fill="#90a4ae" font-style="italic">source traced in gen_response</text>

  <!-- prep label on arrow -->
  <line x1="582" y1="155" x2="645" y2="155" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrgrn)"/>
  <text x="613" y="148" text-anchor="middle" font-size="8" fill="#2e7d32" font-weight="600">--prep</text>
  <text x="613" y="170" text-anchor="middle" font-size="7.5" fill="#90a4ae" font-style="italic">(default: on)</text>

  <!-- ── COLUMN 4: st-prep ─────────────────────────────────────────────── -->
  <rect x="647" y="110" width="110" height="90" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="702" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">st-prep</text>
  <line x1="649" y1="150" x2="755" y2="150" stroke="#2e7d32" stroke-width="0.8" opacity="0.4"/>
  <text x="702" y="163" text-anchor="middle" font-size="8.5" fill="#2e7d32">clean · structure</text>
  <text x="702" y="175" text-anchor="middle" font-size="8.5" fill="#2e7d32">title · story entry</text>
  <text x="702" y="188" text-anchor="middle" font-size="8"   fill="#90a4ae" font-style="italic">skip with --no-prep</text>

  <!-- arrows from st-prep → downstream -->
  <line x1="757" y1="138" x2="820" y2="107" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrblu)"/>
  <line x1="757" y1="155" x2="820" y2="155" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrblu)"/>
  <line x1="757" y1="172" x2="820" y2="203" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrblu)"/>

  <!-- ── COLUMN 5: Next steps ──────────────────────────────────────────── -->
  <text x="890" y="57" text-anchor="middle" font-size="9" font-weight="700" fill="#546e7a" letter-spacing="1">NEXT STEPS</text>

  <rect x="822" y="64"  width="118" height="54" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.3"/>
  <text x="881" y="84"  text-anchor="middle" font-size="10" font-weight="700" fill="#0d47a1">st-fact</text>
  <text x="881" y="98"  text-anchor="middle" font-size="8.5" fill="#1565c0">AI fact-check</text>
  <text x="881" y="110" text-anchor="middle" font-size="8.5" fill="#1565c0">the imported content</text>

  <rect x="822" y="128" width="118" height="54" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.3"/>
  <text x="881" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#4a148c">st-post</text>
  <text x="881" y="162" text-anchor="middle" font-size="8.5" fill="#7b1fa2">publish to Discourse</text>
  <text x="881" y="174" text-anchor="middle" font-size="8.5" fill="#7b1fa2">or your own forum</text>

  <rect x="822" y="192" width="118" height="54" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.3"/>
  <text x="881" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#1b5e20">st</text>
  <text x="881" y="226" text-anchor="middle" font-size="8.5" fill="#388e3c">interactive menu —</text>
  <text x="881" y="238" text-anchor="middle" font-size="8.5" fill="#388e3c">all commands available</text>

  <!-- footer -->
  <text x="480" y="278" text-anchor="middle" font-size="8" fill="#bbb">cross-st · st-fetch · 2026-04-16 · cross-internal/graphics/st_fetch_concept.svg</text>
</svg>

