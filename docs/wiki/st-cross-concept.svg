<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Title ──────────────────────────────────────────────────────── -->
  <text x="400" y="16" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="13" font-weight="600" fill="#111827">
    st-cross — every AI writes a report · every AI fact-checks every report · N×N score grid
  </text>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 1 — Report AI  (blue)
       x=48, y=28, w=188, h=198
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="48"  y="28"  width="188" height="198" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="48"  y="28"  width="188" height="28"  rx="7" fill="#1d4ed8"/>
  <rect x="48"  y="44"  width="188" height="12"         fill="#1d4ed8"/>
  <text x="142" y="47"  text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="white">Report AI</text>
  <line x1="48"  y1="90"  x2="236" y2="90"  stroke="#bfdbfe" stroke-width="1"/>
  <line x1="48"  y1="124" x2="236" y2="124" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="48"  y1="158" x2="236" y2="158" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="48"  y1="192" x2="236" y2="192" stroke="#bfdbfe" stroke-width="1"/>
  <text x="142" y="74"  text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1e3a8a">Anthropic</text>
  <text x="142" y="108" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1e3a8a">Gemini</text>
  <text x="142" y="142" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1e3a8a">OpenAI</text>
  <text x="142" y="176" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1e3a8a">Perplexity</text>
  <text x="142" y="210" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1e3a8a">xAI</text>

  <!-- ── × operator ───────────────────────────────────────────────── -->
  <text x="256" y="135" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="36" font-weight="700" fill="#7c3aed">×</text>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 2 — Fact Check AI  (purple)
       x=275, y=28, w=188, h=198
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="275" y="28"  width="188" height="198" rx="7" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <rect x="275" y="28"  width="188" height="28"  rx="7" fill="#7c3aed"/>
  <rect x="275" y="44"  width="188" height="12"         fill="#7c3aed"/>
  <text x="369" y="47"  text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="white">Fact Check AI</text>
  <line x1="275" y1="90"  x2="463" y2="90"  stroke="#e9d5ff" stroke-width="1"/>
  <line x1="275" y1="124" x2="463" y2="124" stroke="#e9d5ff" stroke-width="1"/>
  <line x1="275" y1="158" x2="463" y2="158" stroke="#e9d5ff" stroke-width="1"/>
  <line x1="275" y1="192" x2="463" y2="192" stroke="#e9d5ff" stroke-width="1"/>
  <text x="369" y="74"  text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#581c87">Anthropic</text>
  <text x="369" y="108" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#581c87">Gemini</text>
  <text x="369" y="142" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#581c87">OpenAI</text>
  <text x="369" y="176" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#581c87">Perplexity</text>
  <text x="369" y="210" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#581c87">xAI</text>

  <!-- ── = operator ───────────────────────────────────────────────── -->
  <text x="484" y="135" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="36" font-weight="700" fill="#374151">=</text>

  <!-- ══════════════════════════════════════════════════════════════════
       BOX 3 — Result  (green)
       x=503, y=28, w=242, h=198
  ══════════════════════════════════════════════════════════════════ -->
  <rect x="503" y="28"  width="242" height="198" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="503" y="28"  width="242" height="28"  rx="7" fill="#15803d"/>
  <rect x="503" y="44"  width="242" height="12"         fill="#15803d"/>
  <text x="624" y="47"  text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="white">Result</text>

  <text x="624" y="101" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#14532d">5 AI reports</text>
  <line x1="523" y1="114" x2="725" y2="114" stroke="#bbf7d0" stroke-width="1"/>
  <text x="624" y="138" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#14532d">25 AI fact-check reports</text>
  <text x="624" y="155" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#166534">(5 reports × 5 fact-checkers)</text>
  <line x1="523" y1="166" x2="725" y2="166" stroke="#bbf7d0" stroke-width="1"/>
  <text x="624" y="191" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#14532d">Fact-check score</text>
  <text x="624" y="207" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#166534">per report · per AI · saved to JSON</text>

  <!-- ── Footer ────────────────────────────────────────────────────── -->
  <text x="400" y="247" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#6b7280">
    Step 1: each AI generates a report in parallel  ·  Step 2: each AI fact-checks every report  ·  scores saved back to subject.json
  </text>
  <text x="400" y="264" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#6b7280">
    View results with st-heatmap · st-verdict · st-analyze · st-merge
  </text>
</svg>

