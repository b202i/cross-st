[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: subprocess / integration tests — real CLI, no AI calls
          (skipped by default — run with --slow to include)
    live: real AI calls with cache enabled — free after first run
          (skipped by default — run with --live to include)
addopts =
    --tb=short
    --ignore=.venv
    --ignore=story
    --ignore=tmp
    --ignore=api_cache
    --ignore=__pycache__
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
